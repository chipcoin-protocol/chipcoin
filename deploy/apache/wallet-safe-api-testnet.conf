<VirtualHost *:443>
    ServerName testnet-api.chipcoinprotocol.com

    # TLS certificate directives are intentionally operator-managed.
    # Example:
    # SSLEngine on
    # SSLCertificateFile /etc/letsencrypt/live/testnet-api.chipcoinprotocol.com/fullchain.pem
    # SSLCertificateKeyFile /etc/letsencrypt/live/testnet-api.chipcoinprotocol.com/privkey.pem

    ProxyRequests Off
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host "testnet-api.chipcoinprotocol.com"

    # Temporary public browser-wallet CORS policy. This is intentionally only
    # acceptable while the API surface is constrained by the path allowlist
    # below and no credentialed requests are used.
    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type"
    Header always set Vary "Origin"

    RewriteEngine On

    # Block every request by default. Only the exact wallet-safe path/method
    # combinations below are allowed through to the private local node API.
    RewriteCond %{REQUEST_METHOD} =GET
    RewriteCond %{REQUEST_URI} !^/v1/(health|status|supply)$
    RewriteCond %{REQUEST_URI} !^/v1/address/[^/]+(/utxos|/history)?$
    RewriteCond %{REQUEST_URI} !^/v1/tx/[0-9a-fA-F]{64}$
    RewriteRule ^ - [F]

    RewriteCond %{REQUEST_METHOD} =POST
    RewriteCond %{REQUEST_URI} !^/v1/tx/submit$
    RewriteRule ^ - [F]

    RewriteCond %{REQUEST_METHOD} =OPTIONS
    RewriteCond %{REQUEST_URI} !^/v1/(health|status|supply)$
    RewriteCond %{REQUEST_URI} !^/v1/address/[^/]+(/utxos|/history)?$
    RewriteCond %{REQUEST_URI} !^/v1/tx/[0-9a-fA-F]{64}$
    RewriteCond %{REQUEST_URI} !^/v1/tx/submit$
    RewriteRule ^ - [F]

    RewriteCond %{REQUEST_METHOD} !^(GET|POST|OPTIONS)$
    RewriteRule ^ - [F]

    ProxyPass "/" "http://127.0.0.1:28081/"
    ProxyPassReverse "/" "http://127.0.0.1:28081/"

    ErrorLog ${APACHE_LOG_DIR}/chipcoin-testnet-wallet-api-error.log
    CustomLog ${APACHE_LOG_DIR}/chipcoin-testnet-wallet-api-access.log combined
</VirtualHost>
